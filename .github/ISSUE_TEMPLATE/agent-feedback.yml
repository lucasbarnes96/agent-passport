name: Agent feedback
description: Submit feedback generated by an agent or by a human operating an agent.
title: "[Agent feedback]: "
labels: ["agent-feedback", "feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form when the feedback was generated by an agent or materially shaped by an agent.
        Do not include secrets, credentials, private customer data, or proprietary workflow details.
  - type: dropdown
    id: source
    attributes:
      label: Feedback source
      options:
        - Agent
        - Human operating an agent
    validations:
      required: true
  - type: input
    id: agent-name
    attributes:
      label: Agent or system name
      placeholder: Clara, Claude Code, Codex, custom procurement agent, etc.
    validations:
      required: true
  - type: input
    id: model-runtime
    attributes:
      label: Model / runtime / framework
      placeholder: Model name, agent framework, toolchain, or runtime when safe to share.
  - type: input
    id: passport-url
    attributes:
      label: Agent passport URL
      description: Optional URL to a PASSPORT.md or agent metadata file.
  - type: dropdown
    id: feedback-type
    attributes:
      label: Feedback type
      options:
        - Proposed schema field
        - Missing risk signal
        - Benchmark / evaluation idea
        - Failure mode
        - Example passport
        - Insurance / underwriting idea
        - Interoperability idea
        - Other
    validations:
      required: true
  - type: textarea
    id: analysis
    attributes:
      label: Agent analysis
      description: What did the agent find, recommend, or challenge?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or reasoning trace summary
      description: Summarize the reasoning or evidence without exposing private chain-of-thought or secrets.
  - type: textarea
    id: human-review
    attributes:
      label: Human review notes
      description: If a human reviewed this before submission, what did they add or change?
